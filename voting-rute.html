<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Rute Karnaval - HUT RI ke-81 Tempuran</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@700;800;900&family=JetBrains+Mono:wght@600;700&display=swap');
:root{
  --bg:#F7F8FA;--white:#FFFFFF;--merah:#D71920;--merah2:#ED3038;--merahmuda:#FDE8E8;
  --emas:#F4B400;--emaslight:#FFF3D2;--emasterang:#FFCB3D;--hijau:#0E9A5A;--hijaulight:#ECFDF5;
  --teks:#0F172A;--teks2:#475569;--teks3:#94A3B8;--border:#E2E8F0;
  --shadow:0 1px 3px rgba(15,23,42,.08);--shadow2:0 10px 26px -8px rgba(15,23,42,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--teks);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:40px;
  background-image:radial-gradient(circle at 8% 0%, rgba(215,25,32,.05), transparent 42%),radial-gradient(circle at 92% 6%, rgba(244,180,0,.07), transparent 40%);}
.mono{font-family:'JetBrains Mono',monospace;}
main{max-width:480px;margin:0 auto;padding:0 16px;}

.hero{background:linear-gradient(150deg,#0F172A 0%,#D71920 42%,#ED3038 78%,#0F172A 100%);padding:28px 20px 32px;position:relative;overflow:hidden;border-radius:0 0 22px 22px;box-shadow:0 16px 40px -18px rgba(15,23,42,.55);text-align:center;}
.hero::after{content:'';position:absolute;inset:0;opacity:.1;pointer-events:none;background-image:repeating-linear-gradient(45deg,#fff 0 1.5px,transparent 1.5px 20px);}
.hero-badge{display:inline-block;background:rgba(255,255,255,.16);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 14px;font-size:11px;color:#fff;font-weight:700;letter-spacing:.5px;position:relative;z-index:2;}
.hero h1{font-family:'Poppins',sans-serif;font-size:24px;font-weight:900;color:#fff;margin:12px 0 6px;position:relative;z-index:2;text-shadow:0 4px 18px rgba(0,0,0,.25);}
.hero p{font-size:12.5px;color:rgba(255,255,255,.85);position:relative;z-index:2;line-height:1.5;}

.card{background:var(--white);border-radius:16px;padding:18px;margin-top:16px;box-shadow:var(--shadow2);border:1px solid var(--border);}
.route-card{border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s;}
.route-card:active{transform:scale(.98);}
.route-card.selected{border-color:var(--merah);background:var(--merahmuda);}
.route-img{width:100%;border-radius:10px;max-height:180px;object-fit:cover;margin-bottom:10px;}
.route-name{font-size:14.5px;font-weight:800;}
.route-desc{font-size:11.5px;color:var(--teks2);margin-top:4px;line-height:1.5;}
.route-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:10px;}
.route-card.selected .route-radio{border-color:var(--merah);background:var(--merah);}
.route-card.selected .route-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;}
.route-head{display:flex;align-items:flex-start;}

.btn-vote{width:100%;background:linear-gradient(135deg,var(--merah),var(--merah2));color:#fff;border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:800;cursor:pointer;margin-top:16px;box-shadow:0 6px 18px -6px rgba(215,25,32,.5);}
.btn-vote:disabled{opacity:.5;cursor:not-allowed;}
.btn-vote:active{transform:scale(.98);}

.result-row{margin-bottom:16px;}
.result-top{display:flex;gap:10px;align-items:flex-start;}
.result-img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.result-head{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px;}
.result-desc{font-size:11px;color:var(--teks3);margin-bottom:6px;}
.progress{height:10px;border-radius:99px;background:var(--bg);overflow:hidden;}
.progress>div{height:100%;background:linear-gradient(90deg,var(--merah),var(--emas));border-radius:99px;transition:width .6s ease;}
.result-row.winner .result-head span:first-child::after{content:' 🏆';}

.badge-voted{display:flex;align-items:center;gap:8px;background:var(--hijaulight);color:var(--hijau);border-radius:12px;padding:12px 14px;font-size:12.5px;font-weight:700;margin-top:16px;}
.total-suara{text-align:center;font-size:11.5px;color:var(--teks3);margin-top:14px;}

.empty{text-align:center;padding:36px 16px;color:var(--teks3);font-size:13px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--merah);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;margin-top:24px;font-size:10.5px;color:var(--teks3);}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🇮🇩 HUT RI ke-81</div>
  <h1>Vote Rute Karnaval</h1>
  <p>BINA TARUNA Dusun Tempuran 2026<br>Pilih rute favorit kamu buat Karnaval 23 Agustus!</p>
</div>

<main>
  <div class="card" id="mainCard">
    <div class="empty"><div class="spinner"></div>Memuat opsi rute...</div>
  </div>
  <footer>Suara kamu tersimpan otomatis di HP ini &middot; 1 HP = 1 suara</footer>
</main>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwgfRY9OfFIR9gatje54xTpzqwQsRdgUCxeP0xlY2SgDzrWwnXa8-9DMiW28iNbcsNY/exec';
const VOTE_KEY = 'hutri81_voted_rute';

async function safeGet(key) {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=get&key=${encodeURIComponent(key)}`);
    const data = await res.json();
    return data.value || null;
  } catch(e) { return null; }
}
async function safeSet(key, value) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: `action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`
    });
    const data = await res.json();
    return data.success || false;
  } catch(e) { return false; }
}

let ruteOptions = [];
let ruteVotes = {};
let selectedId = null;

function getVotedId() {
  try { return localStorage.getItem(VOTE_KEY); } catch(e) { return null; }
}
function setVotedId(id) {
  try { localStorage.setItem(VOTE_KEY, id); } catch(e) {}
}

function renderResults(highlightId) {
  const totalSuara = Object.values(ruteVotes).reduce((s,v)=>s+(+v||0),0);
  const maxSuara = Math.max(0, ...ruteOptions.map(r=>+ruteVotes[r.id]||0));
  const rows = ruteOptions.map(r=>{
    const suara = +ruteVotes[r.id]||0;
    const pct = totalSuara>0 ? Math.round(suara/totalSuara*100) : 0;
    const isWinner = suara>0 && suara===maxSuara;
    const isYours = String(r.id)===String(highlightId);
    return `<div class="result-row ${isWinner?'winner':''}">
      <div class="result-top">
        ${r.foto?`<img class="result-img" src="${r.foto}" alt="${r.nama}">`:''}
        <div style="flex:1;">
          <div class="result-head"><span>${r.nama}${isYours?' <span style=\"color:var(--merah)\">(pilihanmu)</span>':''}</span><span class="mono">${suara} (${pct}%)</span></div>
          ${r.desk?`<div class="result-desc">${r.desk}</div>`:''}
          <div class="progress"><div style="width:${pct}%"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
  return `${rows}<div class="total-suara">Total ${totalSuara} suara masuk</div>`;
}

function renderVoteForm() {
  const cards = ruteOptions.map(r=>`
    <div class="route-card" data-id="${r.id}" onclick="selectRoute('${r.id}')">
      ${r.foto?`<img class="route-img" src="${r.foto}" alt="${r.nama}">`:''}
      <div class="route-head">
        <div class="route-radio"></div>
        <div>
          <div class="route-name">${r.nama}</div>
          ${r.desk?`<div class="route-desc">${r.desk}</div>`:''}
        </div>
      </div>
    </div>`).join('');
  return `${cards}<button class="btn-vote" id="btnVote" disabled onclick="submitVote()">Pilih salah satu rute dulu</button>`;
}

function selectRoute(id) {
  selectedId = id;
  document.querySelectorAll('.route-card').forEach(c=>c.classList.toggle('selected', c.dataset.id===id));
  const btn = document.getElementById('btnVote');
  btn.disabled = false;
  btn.textContent = '✅ Kirim Suara';
}

async function submitVote() {
  if(!selectedId) return;
  const btn = document.getElementById('btnVote');
  btn.disabled = true;
  btn.textContent = 'Mengirim...';
  const fresh = await safeGet('rute_votes');
  ruteVotes = fresh ? JSON.parse(fresh) : ruteVotes;
  ruteVotes[selectedId] = (+ruteVotes[selectedId]||0) + 1;
  const ok = await safeSet('rute_votes', JSON.stringify(ruteVotes));
  if(!ok){
    btn.disabled = false; btn.textContent = '❌ Gagal, coba lagi';
    return;
  }
  setVotedId(selectedId);
  const card = document.getElementById('mainCard');
  card.innerHTML = `
    <div class="badge-voted">🎉 Terima kasih! Suara kamu udah masuk.</div>
    <div style="margin-top:16px;">${renderResults(selectedId)}</div>`;
}

async function init() {
  const [opt, vt] = await Promise.all([safeGet('rute_options'), safeGet('rute_votes')]);
  ruteOptions = opt ? JSON.parse(opt) : [];
  ruteVotes = vt ? JSON.parse(vt) : {};
  const card = document.getElementById('mainCard');

  if(!ruteOptions.length){
    card.innerHTML = `<div class="empty">🗳️<br><br>Voting belum dibuka panitia.<br>Coba cek lagi nanti ya.</div>`;
    return;
  }

  const voted = getVotedId();
  if(voted && ruteOptions.find(r=>String(r.id)===String(voted))){
    card.innerHTML = `
      <div class="badge-voted">✅ Kamu udah vote dari HP ini.</div>
      <div style="margin-top:16px;">${renderResults(voted)}</div>`;
  } else {
    card.innerHTML = renderVoteForm();
  }
}
init();
</script>
</body>
</html>
